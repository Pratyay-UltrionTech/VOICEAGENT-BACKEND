# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy Python app to Azure Web App - VoiceAgent

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: voiceagent-backend-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate dependencies install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          chmod +x startup.sh

      - name: Upload source artifact (Oryx builds on Azure)
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !.venv/
            !venv/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_91C8A7B5E81C4173A92558F2CE99146C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA5AA3532A384B358389520868A076DA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_35E837480CA74D1EA20EC7521953649C }}

      - name: Configure App Service (Python 3.12 + Oryx build)
        run: |
          RG=$(az webapp list --query "[?name=='VoiceAgent'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ] || [ "$RG" = "null" ]; then
            echo "Could not resolve resource group for app VoiceAgent"
            exit 1
          fi
          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"
          az webapp config appsettings set \
            -g "$RG" \
            -n VoiceAgent \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true \
              WEBSITES_PORT=8000 \
              PYTHONPATH=/home/site/wwwroot
          az webapp config set \
            -g "$RG" \
            -n VoiceAgent \
            --linux-fx-version "PYTHON|3.12" \
            --startup-file "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
          echo "Waiting for App Service configuration to settle..."
          sleep 20

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: VoiceAgent
          slot-name: Production
          startup-command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

      - name: Smoke test /health
        run: |
          URL="https://voiceagent-cxhkdsdcfcbkbcg2.centralindia-01.azurewebsites.net/health"
          # Oryx cold start (zstd extract + imports) can take 3+ minutes.
          for i in $(seq 1 12); do
            echo "Health check attempt $i..."
            HTTP=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              cat /tmp/health.json
              echo ""
              echo "Backend is healthy."
              exit 0
            fi
            sleep 25
          done
          echo "Backend /health did not return 200 after deploy."
          exit 1
