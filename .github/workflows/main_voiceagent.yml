# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - VoiceAgent

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping deploys — a common cause of OneDeploy 409 Conflict errors.
concurrency:
  group: voiceagent-backend-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into antenv
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          chmod +x startup.sh

      - name: Upload deployment artifact (includes pre-built antenv)
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_91C8A7B5E81C4173A92558F2CE99146C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA5AA3532A384B358389520868A076DA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_35E837480CA74D1EA20EC7521953649C }}

      - name: Configure App Service for pre-built deploy
        run: |
          RG=$(az webapp list --query "[?name=='VoiceAgent'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ] || [ "$RG" = "null" ]; then
            echo "Could not resolve resource group for app VoiceAgent"
            exit 1
          fi
          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"
          az webapp config appsettings set \
            -g "$RG" \
            -n VoiceAgent \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITES_PORT=8000
          az webapp config set \
            -g "$RG" \
            -n VoiceAgent \
            --linux-fx-version "PYTHON|3.12"
          echo "Waiting for App Service configuration to settle..."
          sleep 30

      - name: Deploy to Azure Web App (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: VoiceAgent
          slot-name: Production
          startup-command: bash startup.sh

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: VoiceAgent
          slot-name: Production
          startup-command: bash startup.sh

      - name: Wait before final retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (attempt 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: VoiceAgent
          slot-name: Production
          startup-command: bash startup.sh

      - name: Verify deploy succeeded
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ] \
            || [ "${{ steps.deploy2.outcome }}" = "success" ] \
            || [ "${{ steps.deploy3.outcome }}" = "success" ]; then
            echo "Deployment succeeded."
            exit 0
          fi
          echo "All deployment attempts failed (409 Conflict or SCM restart is common — re-run workflow)."
          exit 1
